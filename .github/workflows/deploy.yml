name: Deploy to Amazon EC2

on:
  push:
    branches: [ "main" ] # Hoặc branch ông dùng

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1 # Thay bằng region của ông

      - name: Upload to S3
        run: |
          aws deploy push \
            --application-name MyCodeDeployAppName \
            --description "This is a revision for the application" \
            --ignore-hidden-files \
            --s3-location s3://ten-bucket-cua-ong/test-app.zip \
            --source .

      - name: Create CodeDeploy Deployment
        run: |
          aws deploy create-deployment \
            --application-name MyCodeDeployAppName \
            --deployment-config-name CodeDeployDefault.OneAtATime \
            --deployment-group-name MyDeploymentGroupName \
            --s3-location bucket=ten-bucket-cua-ong,key=test-app.zip,bundleType=zip
